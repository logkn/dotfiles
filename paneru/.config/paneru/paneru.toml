[options]
focus_follows_mouse = true
mouse_follows_focus = true
border_active_window = true
dim_inactive_windows = -0.05
border_width = 1.0
animation_speed = 80
preset_column_widths = [0.25, 0.33, 0.50, 0.66, 0.75]
swipe_gesture_fingers = 3
# auto_center = true
padding_left = 5
padding_right = 5

[bindings]
# Moves the focus between windows.
window_focus_west = ["alt - h"]
window_focus_east = ["alt - l"]
window_focus_north = ["alt - k"]
window_focus_south = ["alt - j"]

# Swaps windows in chosen direction.
window_swap_west = ["alt + shift - h"]
window_swap_east = ["alt + shift - l"]

# Jump to the left-most or right-most windows.
window_focus_first = "alt - g"
window_focus_last = ["alt + shift - g"]

# Centers the current window on screen.
window_center = ["alt - c"]

# Cycles between preset window sizes.
window_resize = ["alt - r"]

# Toggle full width for the current focused window.
window_fullwidth = ["alt - f"]

# Toggles the window for management (floating).
window_manage = ["alt - v"]

# Stacks and unstacks a window into the left column.
window_stack = ["alt - ]"]
window_unstack = ["alt + shift - ]"]

# Quits the window manager.
quit = ["ctrl + alt - q"]

[windows]

[windows.pip]
# Title RegExp pattern is required.
title = "Picture.*(in)?.*[Pp]icture"
# Do not manage this window, e.g. it will be floating.
floating = true

[windows.popup]
# Matches a popup and silently appends it at the end.
title = "Unimportant popup window"
dont_focus = true
index = 100
